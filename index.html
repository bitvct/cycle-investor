<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cycle Investor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 32px 24px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 99;
      background: rgba(10, 10, 15, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 24px 16px 16px;
      margin: -32px -24px 20px;
      width: calc(100% + 48px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      text-align: center;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    /* Animated gradient line at top of header */
    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(102, 187, 106, 0.6) 25%,
        rgba(79, 195, 247, 0.6) 50%,
        rgba(239, 83, 80, 0.6) 75%,
        transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 6s linear infinite;
    }
    @keyframes shimmer {
      0% { background-position: -100% 0; }
      100% { background-position: 100% 0; }
    }
    .author-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 6px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 500;
      color: #777;
      text-decoration: none;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 999px;
      transition: all 0.15s;
    }
    .author-link:hover {
      color: #fff;
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
    }
    .header h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg,
        #66bb6a 0%,
        #4fc3f7 35%,
        #b388ff 65%,
        #ef5350 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px rgba(79, 195, 247, 0.25));
      font-feature-settings: 'ss01';
    }
    .header h1::before,
    .header h1::after {
      content: '';
      width: 36px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    }
    .cycle-tabs {
      display: flex;
      gap: 4px;
      margin-top: 16px;
      justify-content: center;
    }
    .cycle-tab {
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .cycle-tab:hover {
      color: #aaa;
      background: rgba(255,255,255,0.06);
    }
    .cycle-tab.active {
      color: #fff;
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.15);
    }
    .loading {
      text-align: center;
      color: #555;
      padding: 80px 0;
      font-size: 14px;
    }
    .lanes {
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      overflow: hidden;
    }
    .lane {
      display: flex;
      align-items: stretch;
      height: 180px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .lane:last-child {
      border-bottom: none;
    }
    .lane-handle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      min-width: 22px;
      color: #444;
      cursor: grab;
      transition: color 0.15s, background 0.15s;
      user-select: none;
    }
    .lane-handle:hover {
      color: #aaa;
      background: rgba(255,255,255,0.04);
    }
    .lane-handle:active { cursor: grabbing; }
    .lane-label {
      width: 150px;
      min-width: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 12px 16px 12px 8px;
      gap: 4px;
      border-right: 1px solid rgba(255,255,255,0.04);
      user-select: none;
    }
    .lane-ghost {
      opacity: 0.4;
      background: rgba(255,255,255,0.05);
    }
    .lane-label .name {
      font-size: 15px;
      font-weight: 600;
    }
    .lane-label .gain {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .lane-label .dates {
      font-size: 10px;
      color: #555;
      line-height: 1.4;
    }
    .lane-chart {
      flex: 1;
      min-width: 0;
    }
    .time-axis-wrapper {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(180deg, rgba(15,15,25,0.4) 0%, rgba(10,10,15,0.98) 30%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 -8px 24px rgba(0,0,0,0.4);
      z-index: 100;
      display: flex;
      justify-content: center;
    }
    .time-axis-wrapper::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(102, 187, 106, 0.5) 30%,
        rgba(239, 83, 80, 0.5) 70%,
        transparent 100%);
    }
    .time-axis-inner {
      width: 100%;
      max-width: 1000px;
      display: flex;
      padding: 0 24px;
    }
    .time-axis-spacer {
      width: 150px;
      min-width: 150px;
    }
    #timeAxis {
      flex: 1;
      height: 90px;
      min-width: 0;
    }
    .lanes {
      padding-bottom: 110px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Cycle Investor</h1>
    <a class="author-link" href="https://x.com/vctbtc" target="_blank" rel="noopener" title="Author on X">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
      <span>@vctbtc</span>
    </a>
    <div class="cycle-tabs">
      <button class="cycle-tab" data-cycle="prevBull" onclick="switchCycle('prevBull')">Bull 2018 — 2021</button>
      <button class="cycle-tab" data-cycle="prevBear" onclick="switchCycle('prevBear')">Bear 2021 — 2022</button>
      <button class="cycle-tab active" data-cycle="bull" onclick="switchCycle('bull')">Bull 2022 — 2025</button>
      <button class="cycle-tab" data-cycle="bear" onclick="switchCycle('bear')">Bear 2025 — ?</button>
    </div>
  </div>
  <div id="app">
    <div class="loading">Loading data...</div>
  </div>
  <div class="time-axis-wrapper">
    <div class="time-axis-inner">
      <div class="time-axis-spacer"></div>
      <div id="timeAxis"></div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
